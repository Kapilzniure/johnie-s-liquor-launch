<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- VIEWPORT -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- BASIC SECURITY HEADERS (meta-level; real headers should be set on the host) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />

  <!--  TITLE (Brand First) -->
  <title>Johnnies Liquor Store Austin | Wine, Beer, Spirits & More</title>

  <!--  DESCRIPTION -->
  <meta name="description" content="Johnnies Liquor Store in Austin. Premium wine, beer, whiskey, tequila & spirits. Visit us at 13201 Pond Springs Rd or order online." />

  <!-- CANONICAL -->
  <link rel="canonical" href="https://johnniesliquor.com/" />

  <!--  GOOGLE SITE VERIFICATION -->
  <meta name="google-site-verification" content="mZP2h6WFgQ5Jh-bYXWqJRXGqVF_qEXJqp8v2sn1GX8E" />

  <!--  FORCE LARGE IMAGE PREVIEW -->
  <meta name="robots" content="index, follow, max-image-preview:large" />

  <!--  FAVICONS (VERY IMPORTANT FOR GOOGLE ICON) -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!--  OPEN GRAPH -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://johnniesliquor.com/" />
  <meta property="og:title" content="Johnnies Liquor Store Austin" />
  <meta property="og:description" content="Austin's trusted liquor store for wine, beer, whiskey, tequila & spirits." />
  <meta property="og:image" content="https://johnniesliquor.com/johnniesliquor.webp" />
  <meta property="og:site_name" content="Johnnies Liquor Store" />

  <!--  TWITTER -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Johnnies Liquor Store Austin" />
  <meta name="twitter:description" content="Austin's trusted liquor store for wine, beer, whiskey, tequila & spirits." />
  <meta name="twitter:image" content="https://johnniesliquor.com/johnniesliquor.webp" />

  <!--  BUSINESS SCHEMA -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LiquorStore",
    "name": "Johnnies Liquor Store",
    "image": "https://johnniesliquor.com/johnniesliquor.webp",
    "url": "https://johnniesliquor.com/",
    "telephone": "+1-512-383-5004",
    "priceRange": "$$",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "13201 Pond Springs Rd, Suite 203",
      "addressLocality": "Austin",
      "addressRegion": "TX",
      "postalCode": "78729",
      "addressCountry": "US"
    },
    "geo": {
      "@type": "GeoCoordinates",
      "latitude": 30.4458344,
      "longitude": -97.778399
    },
    "areaServed": "Austin, TX",
    "openingHoursSpecification": [{
      "@type": "OpeningHoursSpecification",
      "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
      "opens": "10:00",
      "closes": "21:00"
    }],
    "sameAs": [
      "https://www.instagram.com/johnniesliquor_store/",
      "https://www.facebook.com/people/Johnnies-Liquor-Store/61567907153640/"
    ]
  }
  </script>

  <!--  WEBSITE SCHEMA (THIS FIXES SITE NAME) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Johnnies Liquor Store",
    "alternateName": "Johnnies Liquor Austin",
    "url": "https://johnniesliquor.com/"
  }
  </script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
